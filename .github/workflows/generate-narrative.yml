name: Generate narrative

on:
  schedule:
    # 5th of each month, 06:00 UTC — buffered a few days after month-end
    # for Statistikaamet to actually publish the new data point.
    - cron: "0 6 5 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Create newsletter campaigns but don't send them"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: node scripts/generate-narrative.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-5

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update narrative data"
          file_pattern: public/data/narrative.json

      # Runs even if the narrative was already up to date (idempotency
      # guard in generate-narrative.mjs just skips the API call, it still
      # exits 0) — narrative.json is guaranteed to exist by this point
      # either way, so the send is always for the current period.
      - name: Send newsletter
        run: node scripts/send-newsletter.mjs ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
          MAILCHIMP_CADENCE_CATEGORY_ID: ${{ secrets.MAILCHIMP_CADENCE_CATEGORY_ID }}
          MAILCHIMP_CADENCE_MONTHLY_ID: ${{ secrets.MAILCHIMP_CADENCE_MONTHLY_ID }}
          MAILCHIMP_CADENCE_QUARTERLY_ID: ${{ secrets.MAILCHIMP_CADENCE_QUARTERLY_ID }}
          MAILCHIMP_LANGUAGE_CATEGORY_ID: ${{ secrets.MAILCHIMP_LANGUAGE_CATEGORY_ID }}
          MAILCHIMP_LANGUAGE_ET_ID: ${{ secrets.MAILCHIMP_LANGUAGE_ET_ID }}
          MAILCHIMP_LANGUAGE_EN_ID: ${{ secrets.MAILCHIMP_LANGUAGE_EN_ID }}

