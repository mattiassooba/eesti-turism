name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  # git-auto-commit-action (in generate-narrative.yml) pushes using the
  # default GITHUB_TOKEN, and GitHub deliberately does not fire `push`
  # triggers for GITHUB_TOKEN-authored commits (anti-loop protection) —
  # so that commit alone would never redeploy. workflow_run does fire
  # for it, since it's keyed off the *other workflow* completing, not
  # the push itself.
  workflow_run:
    workflows: ["Generate narrative"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
